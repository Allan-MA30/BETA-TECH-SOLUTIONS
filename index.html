<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beta Tech Solution Events</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#0f172a;
  color:#fff;
}

/* NAVBAR */
nav{
  background:#111827;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
}

nav h1{
  font-size:20px;
  letter-spacing:1px;
}

nav span{
  color:#38bdf8;
}

/* CONTAINER */
.container{
  padding:30px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
  gap:20px;
}

.card{
  background:#1f2937;
  padding:20px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.card h3{
  margin-bottom:10px;
  color:#38bdf8;
}

.card p{
  font-size:14px;
  margin-bottom:10px;
}

.card a{
  display:inline-block;
  margin-top:10px;
  color:#22c55e;
  text-decoration:none;
  font-weight:bold;
}

/* LOGIN BUTTON (LABEL STYLE) */
.login-btn{
  display:inline-block;
  padding:10px 15px;
  background:#38bdf8;
  color:#000;
  font-weight:bold;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

/* HIDE CHECKBOX */
#toggle{
  display:none;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

#toggle:checked + .modal{
  display:flex;
}

.modal-content{
  background:#1f2937;
  padding:30px;
  border-radius:12px;
  width:300px;
}

.modal-content h2{
  margin-bottom:15px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border:none;
  border-radius:6px;
}

.login-submit{
  width:100%;
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.close{
  display:block;
  margin-top:10px;
  text-align:center;
  color:#f87171;
  cursor:pointer;
}
</style>
</head>
<body>

<nav>
  <h1>BETA TECH <span>SOLUTION EVENTS</span></h1>
</nav>

<div class="container">
  <div class="grid">

    <!-- LOGIN CARD -->
    <div class="card">
      <h3>LOGIN IN TO BETA TECH</h3>
      <p>Access your dashboard securely</p>

      <label for="toggle" class="login-btn">LOGIN IN</label>
    </div>

    
  </div>
</div>

<!-- LOGIN MODAL CONTROL -->
<input type="checkbox" id="toggle">
<div class="modal">
  <div class="modal-content">
    <h2>Login Form</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button class="login-submit">Login</button>

    <label for="toggle" class="close">Close</label>
  </div>
</div>

</body>
</html>
