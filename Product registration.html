<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Registration Form</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffffff; display: flex; justify-content: center; padding: 40px 20px; }
        .form-container { background: #ffb45e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 450px; }
        h2 { margin: 0 0 20px; color: #1c1e21; font-size: 24px; text-align: center; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #4b4f56; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #dddfe2; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        input:focus { outline: none; border-color: #1877f2; box-shadow: 0 0 0 2px #e7f3ff; }
        
        .checkbox-container { display: flex; align-items: flex-start; gap: 10px; margin-top: 20px; }
        .checkbox-container input { width: auto; margin-top: 4px; }
        .checkbox-container label { font-weight: normal; font-size: 13px; color: #606770; cursor: pointer; }
        
        button { width: 100%; background-color: #18f285; color: rgb(255, 255, 255); border: none; padding: 14px; border-radius: 6px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: background 0.2s; }
        button:hover { background-color: #18f285; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Register Your Product</h2>
    <form action="/submit-registration" method="POST">
        
        <!-- Customer Details -->
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="yourname@email.com" required>
        </div>

        <!-- Product Details -->
        <div class="form-group">
            <label for="product-model">Product Model</label>
            <select id="product-model" name="product-model" required>
                <option value="" disabled selected>Select your product</option>
                <option value="ultra-tab-10">UltraTab 10-inch</option>
                <option value="ultra-tab-pro">UltraTab Pro</option>
                <option value="sound-bar-x">SoundBar X-series</option>
            </select>
        </div>

        <div class="form-group">
            <label for="serial">Serial Number</label>
            <input type="text" id="serial" name="serial" placeholder="Located on the back/bottom" required>
        </div>

        <div class="form-group">
            <label for="purchase-date">Date of Purchase</label>
            <input type="date" id="purchase-date" name="purchase-date" required>
        </div>

        <!-- Compliance -->
        <div class="checkbox-container">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to the Terms of Service and Privacy Policy for warranty activation.</label>
        </div>

        <button type="submit">Activate Warranty</button>
    </form>
</div>

</body>
</html>
